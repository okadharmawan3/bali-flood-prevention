project_name: "bali-flood-prevention"
model_name: "lfm2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "/outputs/data/bali-flood/bali_flood_train.jsonl"
  type: "vlm_sft"
  image_root: "/outputs/data/bali-flood/images"

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  seed: 42
  eval_on_start: false
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 5

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: false

benchmarks:
  image_root: "/outputs/data/bali-flood/images"
  benchmarks:
    - name: "bali_flood_eval"
      path: "/outputs/data/bali-flood/bali_flood_test.jsonl"
      metric: "short_answer"
      max_new_tokens: 512

modal:
  app_name: "bali-flood-prevention"
  gpu: "H100:1"
  timeout: 14400
  output_volume: "bali-flood-prevention"
  output_dir: "/outputs"
  detach: false
